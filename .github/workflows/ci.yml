name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo test --release

  wire-compat:
    name: wire compatibility vs C 1.3.4 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo test --manifest-path wire-compat/Cargo.toml

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable && rustup component add rustfmt clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo doc --no-deps

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.88 --profile minimal && rustup default 1.88
      - run: cargo build --all-targets
      - run: cargo test

  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo publish --dry-run

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cargo fuzz run fuzz_endpoint --target x86_64-unknown-linux-gnu -- -max_total_time=60

  spec-sync:
    name: STANDARD.md matches upstream
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # STANDARD.md here is a VERBATIM VENDORED COPY of the wire-format
      # specification that lives in mas-bandwidth/reliable. This job fails if the
      # two have diverged.
      #
      # Why vendor rather than link: an implementer wants the normative text
      # beside the implementation, at the revision they are reading. Why check:
      # a duplicated normative document is the same failure as a duplicated
      # constant, except it drifts silently and the ports are what break.
      #
      # If this fails, the upstream spec changed. Read the diff, port whatever
      # it implies, then copy the new file across in the same commit.
      - name: Compare against mas-bandwidth/reliable
        run: |
          curl -fsSL -o /tmp/upstream-STANDARD.md \
            https://raw.githubusercontent.com/mas-bandwidth/reliable/main/STANDARD.md
          if ! diff -u /tmp/upstream-STANDARD.md STANDARD.md; then
            echo "::error::STANDARD.md has diverged from mas-bandwidth/reliable"
            exit 1
          fi
          echo "STANDARD.md matches upstream"
