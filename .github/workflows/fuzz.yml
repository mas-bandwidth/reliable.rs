name: fuzz

on:
  schedule:
    - cron: "0 6 * * 1" # weekly
  workflow_dispatch:

jobs:
  fuzz:
    name: cargo fuzz (30 minutes, coverage-guided)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cargo fuzz run fuzz_endpoint --target x86_64-unknown-linux-gnu -- -max_total_time=1800
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
